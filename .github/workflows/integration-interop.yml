name: Integration Interop

on:
  pull_request:

jobs:
  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-interop-rust-checks-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-targets --all-features

  interop:
    name: Interop (${{ matrix.scenario }} / ${{ matrix.mode }})
    needs: rust_checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: superseedr_to_superseedr
            mode: v1
          - scenario: superseedr_to_superseedr
            mode: v2
          - scenario: superseedr_to_superseedr
            mode: hybrid
          - scenario: superseedr_to_qbittorrent
            mode: v1
          - scenario: superseedr_to_qbittorrent
            mode: v2
          - scenario: superseedr_to_qbittorrent
            mode: hybrid
          - scenario: qbittorrent_to_superseedr
            mode: v1
          - scenario: qbittorrent_to_superseedr
            mode: v2
          - scenario: qbittorrent_to_superseedr
            mode: hybrid
          - scenario: superseedr_to_transmission
            mode: v1
          - scenario: transmission_to_superseedr
            mode: v1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-integration.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Decide mode for this matrix shard
        id: select_mode
        run: |
          echo "scenario=${{ matrix.scenario }}" >> "$GITHUB_OUTPUT"
          echo "mode=${{ matrix.mode }}" >> "$GITHUB_OUTPUT"
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Run interop harness
        if: steps.select_mode.outputs.run == 'true'
        env:
          INTEROP_TIMEOUT_SECS: "300"
        run: |
          ./integration_tests/run_interop.sh "${{ steps.select_mode.outputs.mode }}" "${{ steps.select_mode.outputs.scenario }}"

      - name: Upload interop artifacts
        if: always() && steps.select_mode.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: interop-artifacts-${{ matrix.scenario }}-${{ matrix.mode }}-${{ github.run_id }}
          path: integration_tests/artifacts/
