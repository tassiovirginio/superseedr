name: Test Signing ONLY (No Build)

on: workflow_dispatch

env:
  KEYCHAIN_PASS: "temp-pass"
  KEYCHAIN_NAME: "build.keychain"

jobs:
  test_signing_mechanics:
    runs-on: macos-latest
    steps:
      - name: 🔐 Setup Keychain (Zero Dependency)
        env:
          p12_base64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          p12_password: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          # 1. Create and Unlock Keychain
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 0 -u "$KEYCHAIN_NAME"
          
          # 2. Decode and Import Cert
          echo "$p12_base64" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$p12_password" -T /usr/bin/codesign
          rm certificate.p12
          
          # 3. SET PARTITION LIST (Critical Step)
          # This specific command prevents the "UI Prompt" hang.
          # -S: Defines the partition list (permissions).
          # -s: Prevents legacy warnings.
          # -k: The keychain password (REQUIRED, otherwise it hangs waiting for input).
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          
          # Verify identity
          security find-identity -v "$KEYCHAIN_NAME"

      - name: ✍️ Test Signing on Dummy File
        run: |
          touch dummy_app.bin
          CERT_IDENTITY=$(security find-identity -v "$KEYCHAIN_NAME" | grep "Developer ID" | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          echo "Signing with: $CERT_IDENTITY"
          /usr/bin/codesign --force --sign "$CERT_IDENTITY" dummy_app.bin
          
          echo "✅ Signing worked! No hang detected."
